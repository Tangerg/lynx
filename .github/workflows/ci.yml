name: CI

on:
  push:
    branches: [main, lyra]
  pull_request:
    branches: [main, lyra]

# Cancel in-progress runs when a new push lands on the same ref —
# saves CI minutes when developers push quickly.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Matrix per workspace module so failures localise. Release-specific hard
  # gates (such as the Core API baseline) run as dedicated blocking steps.
  check:
    name: ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - pkg
          - core
          - agent
          - chatclient
          - chathistory
          - documentpipeline
          - documentreaders
          - documentreaders/html
          - documentreaders/markdown
          - documentreaders/pdf
          - embeddingclient
          - mcp
          - models
          - otel
          - rag
          - tools
          - vectorstores
          - a2a
          - skills
          - tokenizer
          - app/runtime
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: go build
        working-directory: ${{ matrix.module }}
        run: go build ./...

      - name: go vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

      - name: go test
        working-directory: ${{ matrix.module }}
        run: go test -count=1 ./...

      - name: go test race
        working-directory: ${{ matrix.module }}
        run: go test -race -count=1 ./...

      - name: Runtime standalone module graph
        if: matrix.module == 'app/runtime'
        working-directory: app/runtime
        run: make check-standalone

      - name: Core API and wire compatibility guards
        if: matrix.module == 'core'
        working-directory: core
        run: >-
          go test -count=1 ./internal/arch
          -run '^(TestExportedAPIMatchesBaseline|TestWireTypeCoverage|TestWireContractsMatchGolden|TestWireDTOFieldsExcludeArbitraryRuntimeValues)$'

      - name: Core documentation and examples release gate
        if: matrix.module == 'core'
        working-directory: core
        run: >-
          go test -count=1 ./...
          -run '^(Example|TestPublicPackagesHaveDocsAndRunnableExamples)$'

      - name: Core coverage budget
        if: matrix.module == 'core'
        run: scripts/check-core-coverage.sh

      - name: Core dependency budget
        if: matrix.module == 'core'
        working-directory: core
        run: |
          go test -count=1 ./internal/arch -run '^(TestTargetPackagesHaveNoExternalDependencies|TestCoreProductionImportsAreStandardLibraryOnly)$'
          go mod tidy -diff

      # Covers every public constructor plus the shared protocol/mapping suites
      # and the five reference implementations.
      - name: Provider conformance release gate
        if: matrix.module == 'models'
        working-directory: models
        run: >-
          go test -race -count=1
          ./internal/arch
          ./internal/chatconformance
          ./internal/conformance
          ./anthropic
          ./bedrock
          ./google
          ./ollama
          ./openai

      # The coverage guard fails when a backend is added without registering a
      # conformance suite; the remaining tests execute that suite for all 27
      # published backends.
      - name: Vectorstore conformance release gate
        if: matrix.module == 'vectorstores'
        working-directory: vectorstores
        run: >-
          go test -race -count=1 ./...
          -run '^(TestReleaseBackendCoverage|TestRun|TestStoreConformance)$'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          # Build golangci-lint from source with the runner's Go (1.26.5) rather
          # than pulling the prebuilt binary: the prebuilt v1.64.8 is built with
          # go1.24, and golangci-lint refuses to run when its build Go is older
          # than go.mod's `go 1.26.5`. goinstall sidesteps that — same as the
          # local `go install`-ed binary that works.
          install-mode: goinstall
          working-directory: ${{ matrix.module }}
          args: --config=${{ github.workspace }}/.golangci.yml

      # Blocking for every new reachable issue. The checker has one precise,
      # reviewed allowlist for the eight Ollama advisories that have no fixed
      # version; it fails if their module/version changes or a fix appears.
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          scripts/check-vulnerabilities.sh '${{ matrix.module }}'
