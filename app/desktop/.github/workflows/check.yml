# Frontend quality gate — runs the same `npm run check` we run locally:
# typecheck + oxlint + prettier --check + vitest + knip + madge (no new
# circular dependencies) + bundle size budget.
#
# Triggers on every PR + every push to main. The CI script doesn't try
# to start the Wails desktop shell or the Go backend — those are
# separate stages we'll add later (smoke against a real lyra-server is
# tracked in docs/PROTOCOL_ALIGNMENT_2026-05-28.md §7).

name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on the same branch when a new push comes — old
# CI run for the previous commit isn't load-bearing once a newer one
# lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci --no-audit --no-fund

      # `npm run check` = typecheck + lint + format:check + test + knip
      # + check:circular + check:bundle (vite build + size budget),
      # configured in frontend/package.json. Single source of truth so
      # CI and local feedback can't drift.
      - name: Quality gate
        run: npm run check
