<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>lyra</title>
    <!-- First-paint theme class sync.
         Reads the persisted theme id from the same localStorage key the
         Zustand store uses (`lyra.ui`) and toggles `theme-{scheme}` on
         <html> BEFORE any CSS parses, preventing a flash of the wrong scheme.
         "system" (the default) + a missing value follow prefers-color-scheme;
         "light"/"dark" are explicit; custom theme ids default to dark until
         the JS-side `applyTheme()` corrects the class. -->
    <script>
      (function () {
        var systemDark =
          !window.matchMedia || window.matchMedia("(prefers-color-scheme: dark)").matches;
        var scheme = systemDark ? "dark" : "light";
        try {
          var raw = localStorage.getItem("lyra.ui");
          var id = raw ? JSON.parse(raw)?.state?.theme : null;
          if (id === "light") scheme = "light";
          else if (id && id !== "system") scheme = "dark"; // "dark" + custom ids
          // "system" / missing → keep the prefers-color-scheme default above.
        } catch (_) {
          /* localStorage blocked, malformed JSON — keep the system default */
        }
        var root = document.documentElement;
        root.classList.add("theme-" + scheme);
        // Paint the canvas colour on <html> BEFORE the CSS bundle parses, so a
        // cold boot opens straight into the app surface instead of flashing
        // white. Matches the native window BackgroundColour (main.go) for dark,
        // and the light canvas for light. (NATIVE_FEEL.md §B — launch flicker.)
        root.style.backgroundColor = scheme === "light" ? "#ffffff" : "#121212";
      })();
    </script>
    <!-- Focus-ring modality.
         The Wails WebView reports :focus-visible on a plain mouse click too, not
         just keyboard nav — so the accent focus ring flashed on every click.
         Track the last input device on `<html data-pointer>` (pointer by
         default) and flip to keyboard only on a nav key (Tab / arrows); the
         accent ring in globals.css is gated on `html:not([data-pointer])`, so it
         shows only for genuine keyboard focus. Typing a character never
         resurrects it — only nav keys count. -->
    <script>
      (function () {
        var root = document.documentElement;
        root.setAttribute("data-pointer", "");
        addEventListener(
          "pointerdown",
          function () {
            root.setAttribute("data-pointer", "");
          },
          true,
        );
        addEventListener(
          "keydown",
          function (e) {
            if (e.key === "Tab" || e.key.indexOf("Arrow") === 0)
              root.removeAttribute("data-pointer");
          },
          true,
        );
      })();
    </script>
    <!-- Fonts: the native OS stack (SF Pro / PingFang on macOS) — see
         globals.css --font-sans. No bundled webfont, no CDN <link>. -->
  </head>
  <body>
    <div id="root"></div>
    <script src="./src/main.tsx" type="module"></script>
  </body>
</html>
