<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>lyra</title>
    <!-- First-paint theme class sync.
         Reads the persisted theme id from the same localStorage key the
         Zustand store uses (`lyra.ui`) and toggles `theme-{scheme}` on
         <html> BEFORE any CSS parses. This prevents the brief flash of
         structural dark-mode styles for light-theme users on cold boot.
         We only know the scheme for the two built-ins ("dark" / "light");
         custom theme ids default to dark until the plugin loads and the
         JS-side `applyTheme()` corrects the class. -->
    <script>
      (function () {
        var scheme = "dark";
        try {
          var raw = localStorage.getItem("lyra.ui");
          if (raw) {
            var id = JSON.parse(raw)?.state?.theme;
            scheme = id === "light" ? "light" : "dark";
          }
        } catch (_) {
          /* localStorage blocked, malformed JSON — fall back to default dark */
        }
        var root = document.documentElement;
        root.classList.add("theme-" + scheme);
        // Paint the canvas colour on <html> BEFORE the CSS bundle parses, so a
        // cold boot opens straight into the app surface instead of flashing
        // white. Matches the native window BackgroundColour (main.go) for dark,
        // and the light canvas for light. (NATIVE_FEEL.md §B — launch flicker.)
        root.style.backgroundColor = scheme === "light" ? "#ffffff" : "#121212";
      })();
    </script>
    <!-- Fonts (Geist + Geist Mono) are self-hosted and bundled via
         src/main.tsx (@fontsource-variable). A desktop app ships its fonts —
         no Google CDN <link> here. See NATIVE_FEEL.md §A. -->
  </head>
  <body>
    <div id="root"></div>
    <script src="./src/main.tsx" type="module"></script>
  </body>
</html>
